<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Dogs Online</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #board { display: grid; grid-template-columns: repeat(9, 60px); grid-template-rows: repeat(8, 60px); border: 4px solid #1a252f; gap: 2px; background-color: #1a252f; }
        .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; }
        .white { background-color: #ecf0f1; }
        .black { background-color: #7f8c8d; }
        .selected { outline: 4px solid #e74c3c; outline-offset: -4px; }
    </style>
</head>
<body>

    <h1>The Dogs Online</h1>
    <div id="role-display">Loading...</div>
    <div id="status">Syncing...</div>
    <div id="board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA15FP1irwq2HLOjMqtS93Z_ToE8xWnMvQ",
            projectId: "dogs-online",
            // ... (keep your existing config keys)
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gameDoc = doc(db, "games", "dogs_game_1");

        let board = Array(8).fill(null).map(() => Array(9).fill(null));
        let currentPlayer = 'white';
        let selectedSquare = null;

        // Flatten data for Firestore
        function boardToFirestore(b) {
            let flat = {};
            for(let r=0; r<8; r++) for(let c=0; c<9; c++) flat[`${r}-${c}`] = b[r][c] || "null";
            return flat;
        }

        function firestoreToBoard(flat) {
            let b = Array(8).fill(null).map(() => Array(9).fill(null));
            for(let r=0; r<8; r++) for(let c=0; c<9; c++) b[r][c] = (flat[`${r}-${c}`] === "null") ? null : flat[`${r}-${c}`];
            return b;
        }

        onSnapshot(gameDoc, (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                board = firestoreToBoard(data.board);
                currentPlayer = data.currentPlayer;
                renderBoard();
            } else {
                initNewGame();
            }
        });

        async function initNewGame() {
            let b = Array(8).fill(null).map(() => Array(9).fill(null));
            // Add pieces (simplified)
            for(let r=0; r<2; r++) for(let c=0; c<9; c++) if((r+c)%2===0) b[r][c]='black';
            for(let r=6; r<8; r++) for(let c=0; c<9; c++) if((r+c)%2!==0) b[r][c]='white';
            await setDoc(gameDoc, { board: boardToFirestore(b), currentPlayer: 'white' });
        }

        function renderBoard() {
            const el = document.getElementById('board');
            el.innerHTML = '';
            document.getElementById('status').innerText = currentPlayer.toUpperCase() + "'s Turn";
            for(let r=0; r<8; r++) for(let c=0; c<9; c++) {
                const sq = document.createElement('div');
                sq.className = `square ${(r+c)%2===0 ? 'white' : 'black'}`;
                if(board[r][c]) sq.innerText = board[r][c] === 'white' ? '🐩' : '🐕‍🦺';
                sq.onclick = () => handleSquareClick(r, c);
                el.appendChild(sq);
            }
        }

        async function handleSquareClick(r, c) {
            // Add move logic here using boardToFirestore() before setDoc()
            console.log("Clicked:", r, c);
        }
    </script>
</body>
</html>
