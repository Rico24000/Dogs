<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dogs Online</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #status { font-size: 1.2rem; margin: 15px; padding: 10px; background: #34495e; border-radius: 8px; }
        #board { display: grid; grid-template-columns: repeat(9, 60px); grid-template-rows: repeat(8, 60px); border: 4px solid #1a252f; gap: 2px; }
        .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; }
        .white { background-color: #ecf0f1; }
        .black { background-color: #7f8c8d; }
        .selected { outline: 4px solid #e74c3c; outline-offset: -4px; }
        .valid-move { background-color: #2ecc71 !important; }
        .piece { pointer-events: none; }
    </style>
</head>
<body>

    <h1>The Dogs Online</h1>
    <div id="role-display">Detecting Role...</div>
    <div id="status">Loading game...</div>
    <div id="board"></div>

    <script type="module">
        // 1. IMPORT FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 2. YOUR CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyA15FP1irwq2HLOjMqtS93Z_ToE8xWnMvQ",
            authDomain: "dogs-online.firebaseapp.com",
            projectId: "dogs-online",
            storageBucket: "dogs-online.firebasestorage.app",
            messagingSenderId: "460621226118",
            appId: "1:460621226118:web:8db2580e4cc06b75743107",
            databaseURL: "https://dogs-online-default-rtdb.firebaseio.com" // You might need to check this URL in your Firebase Console
        };

        // 3. INITIALIZE
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'game_state');

        // Identify Player
        const urlParams = new URLSearchParams(window.location.search);
        const myRole = urlParams.get('role') || 'spectator'; // 'white' or 'black'
        document.getElementById('role-display').innerText = `You are playing as: ${myRole.toUpperCase()} DOGS`;

        // Game Constants
        const ROWS = 8; const COLS = 9;
        let board = [];
        let currentPlayer = 'white';
        let selectedSquare = null;
        const PIECES = { 'white': '🐩', 'black': '🐕‍🦺' };

        // 4. LISTEN FOR DATA FROM THE CLOUD
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                board = data.board;
                currentPlayer = data.currentPlayer;
                renderBoard();
            } else {
                // First time setup if database is empty
                setupNewGame();
            }
        });

        function setupNewGame() {
            let newBoard = Array(8).fill(null).map(() => Array(9).fill(null));
            let bP = 0; let wP = 0;
            for(let r=0; r<2; r++) for(let c=0; c<9; c++) if((r+c)%2===0 && bP<9) { newBoard[r][c]='black'; bP++; }
            for(let r=6; r<8; r++) for(let c=0; c<9; c++) if((r+c)%2!==0 && wP<9) { newBoard[r][c]='white'; wP++; }
            pushState(newBoard, 'white');
        }

        function pushState(newBoard, nextPlayer) {
            set(gameRef, { board: newBoard, currentPlayer: nextPlayer });
        }

        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            document.getElementById('status').innerText = `${currentPlayer.toUpperCase()}'s Turn`;

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                    if (board[r][c]) {
                        const piece = document.createElement('div');
                        piece.className = 'piece';
                        piece.innerText = PIECES[board[r][c]];
                        square.appendChild(piece);
                    }
                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) square.classList.add('selected');
                    
                    square.onclick = () => handleSquareClick(r, c);
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            if (myRole !== currentPlayer) return; // Prevent playing out of turn

            if (board[r][c] === currentPlayer) {
                selectedSquare = { r, c };
                renderBoard();
            } else if (selectedSquare && !board[r][c]) {
                if (Math.abs(selectedSquare.r - r) === 1 && Math.abs(selectedSquare.c - c) === 1) {
                    // Logic for move
                    const newBoard = JSON.parse(JSON.stringify(board));
                    newBoard[r][c] = currentPlayer;
                    newBoard[selectedSquare.r][selectedSquare.c] = null;
                    
                    // Capture logic simplified for multiplayer stability
                    checkCaptures(newBoard, r, c);
                }
            }
        }

        function checkCaptures(b, r, c) {
            const opponent = currentPlayer === 'white' ? 'black' : 'white';
            const dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];
            let captured = false;

            dirs.forEach(d => {
                const diagR = r + d[0]; const diagC = c + d[1];
                if (diagR >= 0 && diagR < 8 && diagC >= 0 && diagC < 9 && b[diagR][diagC] === currentPlayer) {
                    const s1r = r + d[0], s1c = c;
                    const s2r = r, s2c = c + d[1];
                    [ {r:s1r, c:s1c}, {r:s2r, c:s2c} ].forEach(target => {
                        if (target.r >= 0 && target.r < 8 && target.c >= 0 && target.c < 9 && b[target.r][target.c] === opponent) {
                            if (confirm(`Capture! Click OK to flip, Cancel to remove.`)) {
                                b[target.r][target.c] = currentPlayer;
                            } else {
                                b[target.r][target.c] = null;
                            }
                            captured = true;
                        }
                    });
                }
            });

            pushState(b, opponent);
            selectedSquare = null;
        }
    </script>
</body>
</html>
